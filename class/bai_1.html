<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký học viên</title>
    <style>
      .mauxanh {
        color: blue;
      }
      table {
        background-color: beige;
      }
    </style>
  </head>
  <body>
    <form action="" method="get">
      <table>
        <caption
          font-size="20"
          style="
            color: blue;
            background-color: rgb(150, 225, 226);
            text-align: left;
          "
        >
          ĐĂNG KÝ HỌC VIÊN
        </caption>

        <tbody>
          <tr>
            <td><label for="hovaten" class="mauxanh">Họ và tên</label></td>
            <td colspan="5">
              <input type="text" id="hocvaten" name="hovaten" required />
            </td>
          </tr>
          <tr>
            <td><label for="ngaysinh" class="mauxanh">Ngày sinh</label></td>
            <td colspan="5"><input type="text" id="ngaysinh" /></td>
          </tr>
          <tr>
            <td><label for="gioitinh" class="mauxanh">Giới tính </label></td>
            <td colspan="5">
              <input type="radio" id="gioitinh" name="nu" value="Nu" /><label
                for="gioitinh"
                >Nữ</label
              ><input type="radio" id="gioitinh" name="nam" value="Nam" />
              <label for="gioitinh">Nam</label>
            </td>
          </tr>
          <tr>
            <td style="vertical-align: top" class="mauxanh">
              <label for="diachi">Địa chỉ</label>
            </td>
            <td colspan="5">
              <textarea name="diachi" id="diachi" cols="30" rows="7"></textarea>
            </td>
          </tr>
          <tr>
            <td><label for="lop" class="mauxanh">Lớp </label></td>
            <td colspan="5">
              <select name="lop" id="lop">
                <option value="-- Chọn lớp --">-- Chọn lớp --</option>
                <option value="Toán">Toán</option>
                <option value="Văn">Văn</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="email" class="mauxanh">Email</label></td>
            <td colspan="5"><input type="email" id="email" /></td>
          </tr>
          <tr>
            <td><label for="dienthoai" class="mauxanh">Điện thoại</label></td>
            <td colspan="5"><input type="text" id="dienthoai" /></td>
          </tr>
          <tr>
            <td></td>
            <td colspan="5">
              <input type="submit" value="Đăng ký" />
              <input type="reset" value="Nhập lại" />
            </td>
          </tr>
        </tbody>
      </table>
    </form>
  </body>
</html>
