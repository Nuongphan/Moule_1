<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
        *{
            margin: 0;padding: 0;box-sizing: border-box;
        }
      nav {
        background-color: rgb(36, 34, 34);
        border-radius: 5px;
        padding: 2px 20px;
        width: 570px;margin: 50px;
      }
      nav > ul > li {
        display: inline-block;
        color: white;
        padding: 5px 12px;
        border-right: 1px solid rgb(135, 134, 134);
        position: relative;
        
      }
      nav > ul > li:last-child {
        border-right: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .list {
        color: white;
      }
      nav > ul > li:hover {
        color: green;
      }
      nav > ul > li > ul > li {
        list-style-type: none;
      }
      .list {
        display: none;
        position: absolute;
        top: 100%;
        left: -4px;
        background-color: black;
        padding: 0 10px;
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        width: 150px;
      }
      .list > li {
        margin: 13px;
        border-bottom: 1px solid rgb(135, 134, 134);
        padding: 5px;
      }
      .list > li:last-child {
        border-bottom: none;
      }
      nav > ul > li:hover .list {
        display: block;
      }
      .list > li:hover a {
        color: green;
      }
      nav > ul > li:first-child {
        padding: 10px 12px 10px 0px;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="#">My dashboard</a></li>
        <li><a href="#">Likes</a></li>
        <li>
          <a href="#">Views</a>
          <ul class="list">
            <li>
              <a href="#"><i class="fa-regular fa-file-lines"></i> Documents</a>
            </li>
            <li>
              <a href="#"><i class="fa-solid fa-comment"></i> Messages</a>
            </li>
            <li>
              <a href="#"><i class="fa-solid fa-arrow-right"></i>Sign Out</a>
            </li>
          </ul>
        </li>
        <li><a href="#">Uploads</a></li>
        <li><a href="#">Videos</a></li>
        <li><a href="#">Documents</a></li>
      </ul>
    </nav>
  </body>
</html>
