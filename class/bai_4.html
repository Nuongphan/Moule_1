<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thời khóa biểu</title>
    <style>
      tbody tr,
      tbody th,
      tbody td {
        text-align: center;
        border: 1px solid black;
      }
      table {
        border-collapse: collapse;
      }
      h2,
      thead {
        color: blue;
      }
      .canhphai {
        text-align: right;
      }
      .mauvang {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        <h2>THỜI KHÓA BIỂU</h2>
      </caption>
      <thead>
        <tr>
          <td colspan="3">Lớp: 19CNJCLC01</td>
          <td colspan="3" class="canhphai">Thời gian học: 7:00 ~ 16:00</td>
        </tr>
        <tr>
          <td colspan="3">Giao viên: Ngọc Anh</td>
          <td colspan="3" class="canhphai">Ngày học: Thứ 3,5,7</td>
        </tr>
        <tr>
          <td colspan="3">Phòng học: HD206</td>
          <td colspan="3"></td>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="3"></td>
          <th class="mauvang">Thứ 3</th>
          <th class="mauvang">Thứ 5</th>
          <th class="mauvang">Thứ 7</th>
        </tr>
        <tr style="background-color: orange">
          <th>Tuần</th>
          <th>Ngày bắt đầu</th>
          <th>Ngày kết thúc</th>
          <th colspan="3">Khóa học</th>
        </tr>
        <tr>
          <td>#1</td>
          <td>12/4/2023</td>
          <td>12/10/2023</td>
          <td>Toán</td>
          <td>Lý</td>
          <td>Hóa</td>
        </tr>
        <tr>
          <td>#2</td>
          <td>12/4/2023</td>
          <td>12/10/2023</td>
          <td>Toán</td>
          <td>Lý</td>
          <td>Hóa</td>
        </tr>
        <tr>
          <td>#3</td>
          <td>12/4/2023</td>
          <td>12/10/2023</td>
          <td>Toán</td>
          <td>Lý</td>
          <td>Hóa</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
